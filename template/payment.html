{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title> MalonzaFx</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

  
    
    <!-- Favicon -->
    <link rel="icon" href="{% static 'img/favicon.ico' %}">
<script src="//code.tidio.co/uajb4xnnjhqlxeyslkg0ytpdnlbes93m.js" async></script>
    <!-- Google Web Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="{% static 'lib/animate/animate.min.css' %}" rel="stylesheet">
    <link href="{% static 'lib/owlcarousel/assets/owl.carousel.min.css' %}" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
    
    

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
        }

        .payment-container {
            max-width: 600px;
            margin: 70px auto 0; /* Top margin of 70px */
            background-color: #fff;
            padding: 80px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .payment-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .payment-option .fa {
            font-size: 24px;
            margin-right: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        button {
            padding: 12px 20px;
            background-color: #06BBCC;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background-color: #06BBCC;
        }

        /* Style for M-Pesa logo */
.mpesa-logo {
    width: 250px; /* Adjust the width as needed */
    height: auto; /* Maintain aspect ratio */
    margin-right: 10px; /* Add spacing between image and text */
}

.payment-option {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
}

.payment-option img {
    width: 150px;
    height: auto;
    margin-right: 10px;
}

    </style>
        <style>
            /* Break "Mofrey FX Academy" into two lines on small screens */
            @media (max-width: 576px) {
                .navbar-brand h2 {
                    white-space: normal; /* Allow text to wrap onto multiple lines */
                    font-size: 1.5rem; /* Adjust font size for readability */
                    line-height: 1.2; /* Adjust line height for spacing */
                    text-align: center; /* Center-align text for better presentation */
                }
                .navbar-brand h2 span {
                    display: block; /* Display each part of the text on a new line */
                }
            }
        </style>
</head>

<body>

<!-- Navbar Start -->

   <!-- Navbar Start -->
 <!-- Navbar Start -->
 <nav class="navbar navbar-expand-lg navbar-dark px-5 py-3 py-lg-0">
    <a href="/index" class="navbar-brand p-0">
<h1 style="color: blue;" class="m-0">
    <i class="fas fa-chart-line me-2"></i> <!-- Trading Line Chart Icon -->
    Malonza FX&reg;
</h1>
</a>

    
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
        <span class="fa fa-bars"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarCollapse" style="color: blue;">
        <div class="navbar-nav ms-auto py-0" >
            <a href="/index"  style="color: blue;" class="nav-item nav-link active">Home</a>
           
        </div>
        {% if not user_authenticated %}
        <div class="d-flex ms-lg-3">
            <a href="/register" style="color: blue;" class="btn btn-primary" style="margin-right: 5px;">
                <i class="fas fa-user-plus me-1"></i> Register
            </a>
            <a href="/login" style="color: blue;" class="btn btn-light">
                <i class="fas fa-sign-in-alt me-1"></i> Login
            </a>
        </div>
        {% else %}
        <div class="d-flex ms-lg-3">
           
            <a href="/logout" style="color: blue;" class="btn btn-light">
                <i class="fas fa-sign-in-alt me-1"></i> Logout
            </a>
        </div>
        {% endif %}
    </div>
</nav>


<div class="payment-container">
    <h2>Select Payment Method</h2>

    <!-- M-Pesa Payment Option -->
    
    <div class="payment-option">
        <img src="{% static 'img/mpesa.png' %}" alt="M-Pesa Logo">
        <span>Pay with M-Pesa</span>
    </div>
    
    <form action="/course_mpesa_checkout" method="post">
        {% csrf_token %}
    <input type="text" placeholder="Enter M-Pesa Number" name="phone" required>
    <h2> amount in KES :{{keprice}}</h2>
    <button>Proceed  with Mpesa</button>
    </form>

    <!-- Card Payment Option -->
    <div class="payment-option">
        <img src="{% static 'img/visa.png' %}" alt="M-Pesa Logo">
       
        <span>Pay with Card</span>
    </div>
    <form method="post" action="/course_card_checkout">
        {% csrf_token %}
   
    <h2> amount in $ :{{usdprice}}</h2>
    <a href="{% url 'card_checkout' %}">
    <button>Proceed with Card</button>
    </a>
</form>
</div>


<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'lib/wow/wow.min.js' %}"></script>
<script src="{% static 'lib/easing/easing.min.js' %}"></script>
<script src="{% static 'lib/waypoints/waypoints.min.js' %}"></script>
<script src="{% static 'lib/owlcarousel/owl.carousel.min.js' %}"></script>

<!-- Template Javascript -->
<script src="{% static 'js/main.js' %}"></script>
<!-- Bootstrap JS and jQuery (required for Bootstrap) -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>

</html>
